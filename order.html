
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order/Consultation | Triacakess</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 60px; }

    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(90deg, #ffb6c1 0%, #ff4f8a 100%);
      padding: 15px 40px; border-radius: 50px; margin: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .logo { font-family: 'Pacifico', cursive; font-size: 32px; color: white; }
    .home-btn { background: white; color: #ff4f8a; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: 700; }

    .order-container {
      width: 95%; max-width: 700px; margin: 40px auto;
      background: rgba(20,20,20,0.95); padding: 40px; border-radius: 30px;
      box-shadow: 0 0 25px rgba(255,79,138,0.25);
    }
    h1 { text-align: center; color: #ff4f8a; font-family: 'Pacifico', cursive; margin-bottom: 20px; }

    /* Centered Image Area */
    .image-preview-area { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        margin-bottom: 30px; 
        min-height: 200px; 
    }
    .dynamic-img { 
        display: none; 
        max-width: 250px; 
        height: auto; 
        border-radius: 20px; 
        border: 3px solid #ff4f8a; 
        box-shadow: 0 4px 15px rgba(255,79,138,0.3); 
    }

    .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
    label { color: #ff69b4; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; font-size: 14px; }
    input, select { padding: 15px; border-radius: 16px; background: #111; color: white; border: 1px solid #333; }
    
    button { 
        padding: 18px; border: none; border-radius: 50px; 
        background: linear-gradient(90deg,#ff69b4,#ff1493); color: white; 
        font-weight: 700; width: 100%; margin-top: 20px; cursor: pointer;
    }

    .disclaimer-box { 
      background: #1a1a1a; padding: 20px; border-radius: 15px; 
      border-left: 4px solid #ff4f8a; margin-bottom: 25px; font-size: 14px; color: #ffb6c1;
    }
    .consultation-ui, .standard-ui { display: none; }
    
    footer { margin-top: auto; padding: 50px 20px; text-align: center; color: #666; font-size: 13px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Triacakess 🎀</div>
  <a href="index.html" class="home-btn">HOME</a>
</nav>

<div class="order-container">
  <h1 id="main-title">Order Now 🎂</h1>

  <div class="image-preview-area">
    <img id="preview-img" class="dynamic-img" src="" alt="Cake">
    <img id="catering-img" class="dynamic-img" src="Images/groupstack.jpeg" alt="Catering">
  </div>

  <div id="catering-disclaimer" class="disclaimer-box" style="display:none;">
    <strong>Catering Consultation Info:</strong>
    <ul>
      <li>20+ cake orders require a 5-day notice.</li>
      <li>Party packages include: Cake bags, utensils, and hand wipes.</li>
      <li>Consultations are 30 minutes.</li>
    </ul>
  </div>

  <form id="orderForm" action="https://formsubmit.co/jameshiargross@gmail.com" method="POST">
    <div class="form-group">
      <label>Service Type</label>
      <select id="service-type" name="Service_Type">
        <option value="standard">Standard Cake Order</option>
        <option value="catering">Catering Consultation (30 min)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" required>
    </div>
    
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" name="number" required>
    </div>

    <div id="consultation-fields" class="consultation-ui">
      <div class="form-group">
        <label>Pick a Date & Time</label>
        <input type="datetime-local" name="Consultation_Time" id="consultation-time">
      </div>
    </div>

    <div id="standard-fields" class="standard-ui">
      <div class="form-group">
        <label>Cake Flavor</label>
        <select id="flavor" name="flavor">
          <option value="">-- Select Flavor --</option>
          <option value="vanilla">Vanilla Bean</option>
          <option value="chocolate">Chocolate</option>
          <option value="lemon">Lemon</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1">
      </div>
      <div class="form-group">
        <label>Pickup or Delivery?</label>
        <select id="delivery" name="delivery">
          <option value="No">Pickup (Free)</option>
          <option value="Yes">Delivery</option>
        </select>
      </div>
      <div class="form-group" id="city-group" style="display:none;">
        <label>Delivery Location</label>
        <select id="city" name="city">
          <option value="0">-- Select City --</option>
          <option value="6">St. Louis City (+$6)</option>
          <option value="5">St. Charles, MO (+$5)</option>
          <option value="2">St. Louis County (+$2)</option>
        </select>
        <label style="margin-top:15px;">Address</label>
        <input type="text" name="address">
      </div>
      <div id="price-display" style="color:#ff4f8a; font-size:24px; font-weight:700; margin: 15px 0; text-align:center;">Total: $0</div>
      <input type="hidden" id="final-price-input" name="Total_Price">
    </div>

    <button type="submit">Submit Request</button>
  </form>
</div>

  <footer>
    &copy; Triacakess 2026. All rights reserved. | Designed with ❤️ by Tria. <br>Saint Louis, MO.
</footer>
<script>
  const serviceSelect = document.getElementById('service-type');
  const cateringDisclaimer = document.getElementById('catering-disclaimer');
  const consultationFields = document.getElementById('consultation-fields');
  const standardFields = document.getElementById('standard-fields');
  const mainTitle = document.getElementById('main-title');
  const flavor = document.getElementById("flavor");
  const quantity = document.getElementById("quantity");
  const delivery = document.getElementById("delivery");
  const city = document.getElementById("city");
  const cityGroup = document.getElementById("city-group");
  const previewImg = document.getElementById('preview-img');
  const cateringImg = document.getElementById('catering-img');

  const cakeImages = {
    "vanilla": "Images/vb.png",
    "chocolate": "Images/choco.jpeg",
    "lemon": "Images/vanilla.jpeg"
  };

  function updateView() {
    const isCatering = serviceSelect.value === 'catering';
    cateringDisclaimer.style.display = isCatering ? 'block' : 'none';
    consultationFields.style.display = isCatering ? 'block' : 'none';
    standardFields.style.display = isCatering ? 'none' : 'block';
    mainTitle.innerText = isCatering ? 'Book Consultation' : 'Order Now 🎂';
    
    // Manage image visibility
    previewImg.style.display = (!isCatering && flavor.value) ? 'block' : 'none';
    cateringImg.style.display = isCatering ? 'block' : 'none';
    
    calculatePrice();
  }

  function calculatePrice() {
    if (serviceSelect.value !== 'standard') return;
    if (!flavor.value) {
      document.getElementById("price-display").innerText = "Total: $0";
      document.getElementById("final-price-input").value = "$0";
      return;
    }
    let single = (flavor.value === "vanilla") ? 8 : 7;
    let pair = (flavor.value === "vanilla") ? 14 : 12;
    let qty = parseInt(quantity.value) || 0;
    let total = (Math.floor(qty / 2) * pair) + ((qty % 2) * single);
    if (delivery.value === "Yes") {
      cityGroup.style.display = "flex";
      total += parseInt(city.value) || 0;
    } else {
      cityGroup.style.display = "none";
    }
    document.getElementById("price-display").innerText = "Total: $" + total;
    document.getElementById("final-price-input").value = "$" + total;
  }

  serviceSelect.addEventListener('change', updateView);
  [flavor, quantity, delivery, city].forEach(el => el.addEventListener('change', () => {
      if(flavor.value && cakeImages[flavor.value]) {
          previewImg.src = cakeImages[flavor.value];
      }
      calculatePrice();
      updateView();
  }));

  window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const selectedFlavor = urlParams.get('flavor');
    const serviceType = urlParams.get('type');
    
    if (serviceType === 'catering') {
      serviceSelect.value = 'catering';
    } else if (selectedFlavor) {
      flavor.value = selectedFlavor;
      if (cakeImages[selectedFlavor]) {
        previewImg.src = cakeImages[selectedFlavor];
      }
    }
    updateView();
  };
</script>
</body>
</html>
